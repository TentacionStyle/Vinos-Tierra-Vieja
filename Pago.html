<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Checkout</title>
    <link rel="icon" href="./css/img/logo-uva.png" type="image/png">
    <link rel="stylesheet" href="./css/basic.css">
    <link rel="stylesheet" href="./css/pago.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=EUR"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<script src="./Javascript/Hamburger.js"></script>
<body class="bg-gray-50">

    <div id="loader-overlay">
        <div class="loader-spinner"></div>
        <div class="loader-text flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            Pago Seguro
        </div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-6">

        <div class="checkout-container max-w-md w-full p-10 shadow-lg">
    <h2 class="text-3xl font-bold mb-8 text-gray-800 tracking-tighter text-center">
        Finalizar Compra
    </h2>
    
    <div class="resumen-pago text-center mb-6">
        <h3 class="text-gray-500 uppercase text-[10px] font-bold tracking-widest mb-1">Resumen de tu pedido</h3>
        <p id="total-final-pago" class="text-3xl font-black" style="color: #6f2236;">
            0.00€
        </p>
    </div>

    <div class="space-y-6">
        <div class="relative flex py-2 items-center">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-[9px] uppercase font-bold tracking-widest">Otras opciones</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <button class="w-full bg-[#00AAAD] text-white font-bold py-4 rounded-xl flex items-center justify-center shadow-sm hover:opacity-90 transition">
            <span class="italic font-black mr-2 text-xl">bizum</span> Pagar
        </button>

        <div class="pt-2">
            <div id="paypal-button-container" style="min-height: 50px;" class="w-full"></div>
            <p class="text-[10px] text-center text-gray-500 mt-2">La forma rápida y segura de pagar</p>
        </div>

        <div id="success-msg" class="hidden msg-valido p-4 rounded-2xl text-center font-bold animate-pulse">
            ✅ ¡Operación válida!
        </div>
    </div>
</div>
    </div>
    <script src="./Javascript/Pago.js"></script>
    </body>
</html>
